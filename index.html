<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Task 5 — API Integration</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <nav class="navbar">
    <div class="nav-brand">⚡ UserAPI</div>
    <div class="nav-info">
      <span class="api-status" id="apiStatus">🔴 Disconnected</span>
    </div>
  </nav>

  <main class="container">

    <div class="stats-row">
      <div class="stat-card">
        <h3 id="totalUsers">0</h3>
        <p>Total Users</p>
      </div>
      <div class="stat-card">
        <h3 id="adminCount">0</h3>
        <p>Admins</p>
      </div>
      <div class="stat-card">
        <h3 id="userCount">0</h3>
        <p>Members</p>
      </div>
    </div>

    <div class="main-grid">

      <section class="card">
        <h2 id="formTitle">➕ Add New User</h2>
        <p class="subtitle" id="formSubtitle">Fill in the details below</p>
        <input type="hidden" id="editId" />
        <div class="field">
          <label>Full Name *</label>
          <input type="text" id="inputName" placeholder="John Doe" />
          <span class="msg" id="nameMsg"></span>
        </div>
        <div class="field">
          <label>Email Address *</label>
          <input type="email" id="inputEmail" placeholder="john@example.com" />
          <span class="msg" id="emailMsg"></span>
        </div>
        <div class="field">
          <label>Role</label>
          <select id="inputRole">
            <option value="User">User</option>
            <option value="Admin">Admin</option>
            <option value="Moderator">Moderator</option>
          </select>
        </div>
        <div class="btn-group">
          <button class="btn-primary" onclick="submitForm()">
            <span id="submitText">➕ Add User</span>
          </button>
          <button class="btn-secondary" onclick="resetForm()">↩ Reset</button>
        </div>
      </section>

      <section class="card">
        <div class="list-header">
          <h2>👥 All Users</h2>
          <button class="btn-refresh" onclick="loadUsers()">🔄 Refresh</button>
        </div>
        <input type="text" id="searchInput" placeholder="🔍 Search users..." oninput="filterUsers()" class="search-input" />
        <div id="usersList" class="users-list">
          <div class="loading">Loading users...</div>
        </div>
      </section>

    </div>

    <section class="card log-card">
      <div class="list-header">
        <h2>📡 API Activity Log</h2>
        <button class="btn-secondary" onclick="clearLog()">🗑 Clear</button>
      </div>
      <div id="apiLog" class="api-log"></div>
    </section>

  </main>

  <div class="toast" id="toast"></div>
  <script src="js/app.js"></script>
</body>
</html>
